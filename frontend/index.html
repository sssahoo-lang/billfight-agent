<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillFight</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #1a1a1a; }
      :root {
        --color-background-primary: #fff; --color-background-secondary: #f5f5f5;
        --color-background-info: #E6F1FB; --color-background-warning: #FAEEDA; --color-background-success: #EAF3DE;
        --color-text-primary: #1a1a1a; --color-text-secondary: #666;
        --color-text-info: #185FA5; --color-text-warning: #854F0B; --color-text-success: #0F6E56; --color-text-danger: #A32D2D;
        --color-border-tertiary: rgba(0,0,0,0.12); --color-border-secondary: rgba(0,0,0,0.25); --color-border-info: #185FA5;
        --border-radius-md: 8px; --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #111; color: #f0f0f0; }
        :root {
          --color-background-primary: #1e1e1e; --color-background-secondary: #2a2a2a;
          --color-background-info: #0c2a45; --color-background-warning: #3a2005; --color-background-success: #0d2e1f;
          --color-text-primary: #f0f0f0; --color-text-secondary: #999;
          --color-text-info: #85B7EB; --color-text-warning: #FAC775; --color-text-success: #5DCAA5; --color-text-danger: #F09595;
          --color-border-tertiary: rgba(255,255,255,0.1); --color-border-secondary: rgba(255,255,255,0.2);
        }
      }
      #root { max-width: 860px; margin: 0 auto; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
